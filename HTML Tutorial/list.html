<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIST</title>
</head>
<body>

    <header></header>

    <main>

        <!--unorder list-->

        <h3>*Unorder List*</h3>

        <li>apple</li>
        <ul>
            <li>color : red</li>
            <li>season : winter</li>
        </ul>

        <li>manago</li>
        <ul>
            <li>color : yellow</li>
            <li>season : summer</li>
        </ul>


        <!--order list-->

        <h3>*Order List*</h3>

        <ol>
            <li>Apple</li>

            <ol>
                <li>color : red</li>
                <li>season : winter</li>
            </ol>

            <li>manago</li>

            <ol>
                <li>color : yellow</li>
                <li>season : summer</li>
            </ol>

            <li>litchi</li>
        </ol>
    </main>

    <footer></footer>
</body>
</html>
