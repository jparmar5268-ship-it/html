<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>
<body>
    
    <header></header>

    <form action="/action.php">

        <input type="text" placeholder="username">
        <br><br>
        <input type="password" placeholder="password">
        <br><br>

        <h4>select your class</h4>

        <label for="101">
            <input type="radio" value="class XI" name="class" id="101">class XI
        </label>
        <br><br>

        <label for="102">
            <input type="radio" value="class XII" name="class" id="102">class XII
        </label>
        <br><br>

        <h4>Select your Subject</h4>

        <label for="php">
            <input type="checkbox" value="php" name="subject" id="101">PHP
        </label>

        <label for="java">
            <input type="checkbox" value="java" name="subject" id="101">Java
        </label>

        <label for="c">
            <input type="checkbox" value="c" name="subject" id="101">C
        </label>

        <label for="dfs">
            <input type="checkbox" value="dfs" name="subject" id="101">DFS
        </label>
        <br><br>

        <h4>select your City</h4>
        <select name="city">
            <option value="surat">surat</option>
            <option value="rajkot">rajkot</option>
            <option value="jamnagar">jamnagar</option>
            <option value="bhavnagar">bhavnagar</option>
            <option value="amareli">amareli</option>
        </select>
        <br><br>

        <textarea name="feedback" id="101" placeholder="please give your feedback here" rows="4">Feedback</textarea>
        <br><br>

        <input type="submit" value="submit">
    </form>
